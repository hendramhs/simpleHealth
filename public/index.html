<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Pasien</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-start: #dceaf7;
        --bg-end: #dceaf7;
        --card: #ffffff;
        --text: #1e1e1e;
        --muted: #5b6470;
        --line: #dde3ea;
        --primary: #0b7a75;
        --primary-strong: #08645f;
        --danger: #bc3b4e;
        --danger-strong: #9d2f40;
        --warning-bg: #fff2e2;
        --warning-text: #8a4c00;
        --ok-bg: #e9f9ef;
        --ok-text: #136f39;
        --shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg-end);
        padding: 28px 16px;
      }

      .box {
        max-width: 980px;
        margin: 0 auto;
        background: color-mix(in srgb, var(--card) 90%, #f7fbff);
        border: 1px solid #ffffff;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: riseIn 420ms ease-out;
      }

      .hero {
        padding: 22px 22px 8px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(120deg, #f8fcff, #fffdf8);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 2.2vw, 1.9rem);
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .content {
        padding: 18px 22px 22px;
        display: grid;
        gap: 14px;
      }

      .form-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .span-4 {
        grid-column: span 4;
      }
      .span-3 {
        grid-column: span 3;
      }
      .span-5 {
        grid-column: span 5;
      }

      label {
        font-size: 0.84rem;
        font-weight: 700;
        color: #2e3641;
        letter-spacing: 0.01em;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        font: inherit;
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease;
        background: #ffffff;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(11, 122, 117, 0.14);
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: end;
      }

      button {
        border: 0;
        border-radius: 11px;
        padding: 11px 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 120ms ease,
          filter 120ms ease;
      }

      button:hover {
        filter: brightness(0.98);
      }
      button:active {
        transform: translateY(1px);
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      #submitBtn {
        white-space: nowrap;
      }

      #cancelBtn {
        white-space: nowrap;
      }

      .btn-secondary {
        background: #eef2f7;
        color: #2b333d;
      }

      .btn-danger {
        background: var(--danger);
        color: #fff;
      }

      .toolbar {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .meta {
        font-size: 0.88rem;
        color: var(--muted);
        font-weight: 600;
      }

      .status {
        min-height: 24px;
        padding: 8px 10px;
        border-radius: 10px;
        display: none;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .status.error {
        display: block;
        color: var(--danger-strong);
        background: #ffecef;
        border: 1px solid #ffc4ce;
      }

      .status.ok {
        display: block;
        color: var(--ok-text);
        background: var(--ok-bg);
        border: 1px solid #bcf0cf;
      }

      .status.warn {
        display: block;
        color: var(--warning-text);
        background: var(--warning-bg);
        border: 1px solid #ffd8ad;
      }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: auto;
        background: #fff;
      }

      .pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pagination-info {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 600;
      }

      .pagination-actions {
        display: flex;
        gap: 8px;
      }

      .pagination button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        filter: none;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 640px;
      }

      thead th {
        text-align: left;
        background: #f6f9fc;
        padding: 12px;
        font-size: 0.82rem;
        color: #445061;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--line);
      }

      tbody td {
        padding: 12px;
        border-bottom: 1px solid #eef2f7;
        vertical-align: top;
      }

      tbody tr:hover {
        background: #fcfdfd;
      }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 22px;
        font-weight: 600;
      }

      .row-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .row-actions button {
        padding: 8px 10px;
        font-size: 0.84rem;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #eefaf9;
        color: #116964;
        border: 1px solid #c8ebe8;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(10, 18, 30, 0.45);
        z-index: 50;
        padding: 16px;
      }

      .modal.show {
        display: flex;
      }

      .modal-card {
        width: min(100%, 430px);
        background: #ffffff;
        border: 1px solid #e6ebf1;
        border-radius: 16px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.16);
        padding: 18px;
        animation: riseIn 200ms ease-out;
      }

      .modal-title {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: -0.01em;
      }

      .modal-text {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.45;
      }

      .modal-actions {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 860px) {
        .span-4,
        .span-3,
        .span-5 {
          grid-column: span 12;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        .actions {
          width: 100%;
        }

        .actions button {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="hero">
        <h1>Manajemen Data Pasien</h1>
        <p class="subtitle">
          Kelola data pasien dengan cepat, jelas, dan aman.
        </p>
      </div>

      <div class="content">
        <div class="form-grid">
          <div class="field span-4">
            <label for="nama">Nama Pasien</label>
            <input
              id="nama"
              placeholder="Contoh: Andi Saputra"
              autocomplete="off"
            />
          </div>

          <div class="field span-3">
            <label for="umur">Umur</label>
            <input id="umur" type="number" min="1" placeholder="Contoh: 32" />
          </div>

          <div class="field span-5">
            <label for="diagnosa">Diagnosa</label>
            <input
              id="diagnosa"
              placeholder="Contoh: Demam berdarah"
              autocomplete="off"
            />
          </div>

          <div class="actions span-12">
            <button id="submitBtn" class="btn-primary" onclick="simpan()">
              Tambah Pasien
            </button>
            <button
              id="cancelBtn"
              class="btn-secondary"
              onclick="batalEdit()"
              style="display: none"
            >
              Batal Edit
            </button>
          </div>
        </div>

        <p id="status" class="status" aria-live="polite"></p>

        <div class="toolbar">
          <input
            id="search"
            placeholder="Cari nama, umur, atau diagnosa..."
            onkeyup="renderData()"
          />
          <span id="meta" class="meta">0 pasien</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nama</th>
                <th>Umur</th>
                <th>Diagnosa</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabel"></tbody>
          </table>
        </div>

        <div class="pagination">
          <span id="pageInfo" class="pagination-info">Halaman 1 dari 1</span>
          <div class="pagination-actions">
            <button id="prevPageBtn" class="btn-secondary" type="button">
              Sebelumnya
            </button>
            <button id="nextPageBtn" class="btn-secondary" type="button">
              Berikutnya
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="deleteModal" class="modal" aria-hidden="true">
      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="deleteModalTitle"
      >
        <h2 id="deleteModalTitle" class="modal-title">Hapus Data Pasien?</h2>
        <p class="modal-text">
          Data yang dihapus tidak dapat dikembalikan. Lanjutkan penghapusan?
        </p>
        <div class="modal-actions">
          <button id="deleteCancelBtn" class="btn-secondary" type="button">
            Batal
          </button>
          <button id="deleteConfirmBtn" class="btn-danger" type="button">
            Ya, Hapus
          </button>
        </div>
      </div>
    </div>

    <script>
      let data = [];
      let editingId = null;
      let pendingDeleteId = null;
      let currentPage = 1;
      const pageSize = 10;

      const namaInput = document.getElementById("nama");
      const umurInput = document.getElementById("umur");
      const diagnosaInput = document.getElementById("diagnosa");
      const tabelBody = document.getElementById("tabel");
      const searchInput = document.getElementById("search");
      const submitBtn = document.getElementById("submitBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const statusBox = document.getElementById("status");
      const metaText = document.getElementById("meta");
      const deleteModal = document.getElementById("deleteModal");
      const deleteCancelBtn = document.getElementById("deleteCancelBtn");
      const deleteConfirmBtn = document.getElementById("deleteConfirmBtn");
      const pageInfo = document.getElementById("pageInfo");
      const prevPageBtn = document.getElementById("prevPageBtn");
      const nextPageBtn = document.getElementById("nextPageBtn");

      function setStatus(type, text) {
        statusBox.className = "status";
        statusBox.textContent = text || "";

        if (!text) {
          return;
        }

        statusBox.classList.add(type);
      }

      function resetForm() {
        namaInput.value = "";
        umurInput.value = "";
        diagnosaInput.value = "";
        namaInput.focus();
      }

      function setEditMode(active, id = null) {
        editingId = active ? id : null;
        submitBtn.textContent = active ? "Simpan Perubahan" : "Tambah Pasien";
        cancelBtn.style.display = active ? "inline-flex" : "none";
      }

      function renderData() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filtered = data.filter((p) => {
          const nama = String(p.nama || "").toLowerCase();
          const umur = String(p.umur || "");
          const diagnosa = String(p.diagnosa || "").toLowerCase();

          return (
            nama.includes(keyword) ||
            umur.includes(keyword) ||
            diagnosa.includes(keyword)
          );
        });

        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        currentPage = Math.min(currentPage, totalPages);
        currentPage = Math.max(1, currentPage);

        const startIndex = (currentPage - 1) * pageSize;
        const endIndex = startIndex + pageSize;
        const pagedData = filtered.slice(startIndex, endIndex);

        tabelBody.innerHTML = "";

        if (pagedData.length === 0) {
          tabelBody.innerHTML = `<tr><td colspan="4" class="empty">Tidak ada data yang cocok.</td></tr>`;
          metaText.textContent = `${data.length} pasien • 0 ditampilkan`;
        } else {
          pagedData.forEach((p) => {
            tabelBody.innerHTML += `
      <tr>
        <td>${p.nama}</td>
        <td><span class="chip">${p.umur} tahun</span></td>
        <td>${p.diagnosa}</td>
        <td>
          <div class="row-actions">
            <button class="btn-secondary" onclick="edit(${p.id})">Edit</button>
            <button class="btn-danger" onclick="hapus(${p.id})">Hapus</button>
          </div>
        </td>
      </tr>
    `;
          });

          metaText.textContent = `${data.length} pasien • ${filtered.length} hasil`;
        }

        pageInfo.textContent = `Halaman ${currentPage} dari ${totalPages}`;
        prevPageBtn.disabled = currentPage <= 1;
        nextPageBtn.disabled = currentPage >= totalPages;
      }

      async function loadData() {
        try {
          const res = await fetch("/pasien");
          data = await res.json();
          renderData();
        } catch (error) {
          setStatus("error", "Gagal memuat data pasien. Coba lagi.");
        }
      }

      async function simpan() {
        const nama = namaInput.value.trim();
        const umur = Number(umurInput.value);
        const diagnosa = diagnosaInput.value.trim();

        if (!nama || !umur || !diagnosa) {
          setStatus("error", "Semua field wajib diisi.");
          return;
        }

        if (umur <= 0) {
          setStatus("error", "Umur harus lebih dari 0.");
          return;
        }

        setStatus("", "");

        try {
          if (editingId !== null) {
            // Backend saat ini belum memiliki endpoint update, jadi edit dilakukan delete+create.
            await fetch(`/pasien/${editingId}`, { method: "DELETE" });
          }

          await fetch("/pasien", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nama, umur, diagnosa }),
          });

          setStatus(
            "ok",
            editingId !== null
              ? "Data pasien berhasil diperbarui."
              : "Data pasien berhasil ditambahkan.",
          );
          resetForm();
          setEditMode(false);
          await loadData();
        } catch (error) {
          setStatus("error", "Terjadi kendala saat menyimpan data.");
        }
      }

      function batalEdit() {
        setEditMode(false);
        resetForm();
        setStatus("warn", "Mode edit dibatalkan.");
      }

      function bukaModalHapus(id) {
        pendingDeleteId = id;
        deleteModal.classList.add("show");
        deleteModal.setAttribute("aria-hidden", "false");
        deleteCancelBtn.focus();
      }

      function tutupModalHapus() {
        pendingDeleteId = null;
        deleteModal.classList.remove("show");
        deleteModal.setAttribute("aria-hidden", "true");
      }

      async function konfirmasiHapus() {
        if (pendingDeleteId === null) {
          return;
        }

        const id = pendingDeleteId;
        tutupModalHapus();

        try {
          await fetch(`/pasien/${id}`, { method: "DELETE" });

          if (editingId === id) {
            batalEdit();
          }

          setStatus("ok", "Data pasien berhasil dihapus.");
          await loadData();
        } catch (error) {
          setStatus("error", "Gagal menghapus data pasien.");
        }
      }

      async function hapus(id) {
        bukaModalHapus(id);
      }

      function edit(id) {
        const p = data.find((x) => x.id === id);

        if (!p) {
          setStatus("error", "Data pasien tidak ditemukan.");
          return;
        }

        namaInput.value = p.nama;
        umurInput.value = p.umur;
        diagnosaInput.value = p.diagnosa;
        setEditMode(true, id);
        setStatus(
          "warn",
          "Mode edit aktif. Klik Simpan Perubahan untuk menyelesaikan.",
        );
        namaInput.focus();
      }

      searchInput.addEventListener("input", () => {
        currentPage = 1;
        renderData();
      });

      loadData().then(() => {
        setStatus("", "");
        setEditMode(false);
        metaText.textContent = `${data.length} pasien`;
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && deleteModal.classList.contains("show")) {
          tutupModalHapus();
          return;
        }

        if (
          (event.ctrlKey || event.metaKey) &&
          event.key.toLowerCase() === "enter"
        ) {
          simpan();
        }
        if (event.key === "Escape" && editingId !== null) {
          batalEdit();
        }
      });

      namaInput.addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
          simpan();
        }
      });

      diagnosaInput.addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
          simpan();
        }
      });

      umurInput.addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
          simpan();
        }
      });

      window.simpan = simpan;
      window.hapus = hapus;
      window.edit = edit;
      window.batalEdit = batalEdit;

      window.addEventListener("load", () => {
        namaInput.focus();
      });

      window.addEventListener("pageshow", () => {
        renderData();
      });

      deleteCancelBtn.addEventListener("click", tutupModalHapus);
      deleteConfirmBtn.addEventListener("click", konfirmasiHapus);
      deleteModal.addEventListener("click", (event) => {
        if (event.target === deleteModal) {
          tutupModalHapus();
        }
      });

      prevPageBtn.addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage -= 1;
          renderData();
        }
      });

      nextPageBtn.addEventListener("click", () => {
        currentPage += 1;
        renderData();
      });
    </script>
  </body>
</html>
